<script>
// ---- Build a simple SVG app icon and use it for manifest + apple-touch-icon ----
(function() {
  const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="none" stroke="#2e6da4" stroke-width="6"/>
  <path d="M120 380 L210 220 L260 300 L320 180 L400 380 Z" fill="none" stroke="#b5451b" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="320" cy="150" r="28" fill="#4a9d6f"/>
</svg>`.trim();
  const svgUrl = "data:image/svg+xml;base64," + btoa(svg);
  document.getElementById('apple-icon').setAttribute('href', svgUrl);

  const manifest = {
    name: "Climb Training Plan",
    short_name: "Climb Plan",
    start_url: ".",
    display: "standalone",
    background_color: "#0d0d0d",
    theme_color: "#0d0d0d",
    icons: [
      { src: svgUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
  document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));
})();
</script>

      details:["Pick best weather/temp window (ideal RRG/NRG temps: 45–65°F)","Execute your warm-up ritual without deviation","If stacking PTO into a long weekend, use extra days for more attempts","The training is done. Climb."] },
  ], notes:"The work is in. Redpoint season is here." },
};

const WARMUPS = [
  {
    name: "Indoor Warm-Up",
    color: "#2e6da4",
    steps: [
      { title: "General pulse raise (5 min)", items: ["Light cardio: jog in place, jumping jacks, or arm circles", "Goal: get blood flowing, not get tired"] },
      { title: "Joint prep (5 min)", items: ["Shoulder circles and arm swings, 10 each direction", "Wrist circles and finger extensions/flexions, 15 each", "Hip circles and leg swings, 10 each side"] },
      { title: "Easy climbing (10–15 min)", items: ["5–8 very easy problems or 2–3 easy routes, well below your level", "Focus on full range of motion, not effort", "Include some easy dynamic movement and big reaches"] },
      { title: "Progressive climbing (10–15 min)", items: ["Gradually increase difficulty every 2–3 problems/routes", "By the end you should be at moderate effort, ~60–70% of session-day intensity", "Include a few moves resembling today's session style (crimpy, powerful, enduro, etc.)"] },
      { title: "Final activation (5 min)", items: ["1–2 problems/moves at close to session intensity", "This primes the nervous system right before the main session", "Take a short rest (3–5 min) before starting the actual workout"] },
    ],
  },
  {
    name: "Outdoor Warm-Up",
    color: "#4a9d6f",
    steps: [
      { title: "Before you climb (10 min)", items: ["Light hike/walk to the crag counts as part of this", "Dynamic stretches: leg swings, arm circles, walking lunges", "Hangboard or fingerboard at the car if available: 2–3 light hangs, bodyweight, big edge"] },
      { title: "Easy mileage (20–30 min)", items: ["Climb 2–4 routes well below your grade", "If limited routes are available, lap the same easy route a few times", "Use this time to read rock, chalk up, settle into the rhythm of the day"] },
      { title: "Progressive burns (15–20 min)", items: ["1–2 routes a couple grades below your target effort for the day", "Focus on movement quality and reading sequences", "This is also a good time to scope out any harder lines for the day"] },
      { title: "Rest before hard effort (10–15 min)", items: ["Let forearms fully recover before your first hard burn or project attempt", "Hydrate, snack, reapply chalk/tape as needed", "Mental check-in: visualize movement, not outcome"] },
    ],
  },
];

const phaseForWeek = (w) => PHASES.find((p) => p.weeks.includes(w));

// Persisted via localStorage so progress survives closing the app
function useStoredState(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : initial;
    } catch (e) {
      return initial;
    }
  });
  const setAndStore = (updater) => {
    setState((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { window.localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };
  return [state, setAndStore];
}

function ClimbingProgram() {
  const [selectedWeek, setSelectedWeek] = useStoredState("climb_selectedWeek", 1);
  const [completedSessions, setCompletedSessions] = useStoredState("climb_completedSessions", {});
  const [expandedSession, setExpandedSession] = useState(null);
  const [selectedOption, setSelectedOption] = useStoredState("climb_selectedOption", {});
  const [hangLog, setHangLog] = useStoredState("climb_hangLog", {});
  const [showLogFor, setShowLogFor] = useState(null);
  const [showWarmups, setShowWarmups] = useState(false);

  const week = PROGRAM[selectedWeek];
  const phase = phaseForWeek(selectedWeek);

  const toggleSession = (weekNum, sessionIdx) => {
    const key = `${weekNum}-${sessionIdx}`;
    setCompletedSessions((prev) => ({ ...prev, [key]: !prev[key] }));
  };

  const toggleExpand = (idx) => setExpandedSession(expandedSession === idx ? null : idx);

  const pickOption = (idx, optName) => {
    setSelectedOption((prev) => ({ ...prev, [`${selectedWeek}-${idx}`]: optName }));
  };

  const updateLog = (idx, field, value) => {
    const key = `${selectedWeek}-${idx}`;
    setHangLog((prev) => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
  };

  const weekProgress = (week.sessions || []).filter((_, i) => completedSessions[`${selectedWeek}-${i}`]).length;
  const totalSessions = week.sessions.length;

  // Build hangboard progress history across all weeks for display
  const hangboardHistory = [];
  Object.keys(PROGRAM).forEach((wk) => {
    PROGRAM[wk].sessions.forEach((s, idx) => {
      if (s.isHangboard) {
        const key = `${wk}-${idx}`;
        const log = hangLog[key];
        const opt = selectedOption[key];
        if (log && (log.edge || log.weight || log.rpe)) {
          hangboardHistory.push({ week: wk, day: s.day, option: opt || "—", ...log });
        }
      }
    });
  });

  return (
    <div style={{ fontFamily: "'Inter','Helvetica Neue',sans-serif", background: "#0d0d0d", minHeight: "100vh", color: "#e0e0e0" }}>
      <div style={{ borderBottom: "1px solid #1e1e1e", padding: "20px 20px 0" }}>
        <div style={{ maxWidth: 760, margin: "0 auto" }}>
          <div style={{ fontSize: 10, letterSpacing: "0.16em", textTransform: "uppercase", color: "#555", marginBottom: 5 }}>
            Sport Climbing · 13-Week Periodization
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 18 }}>
            <h1 style={{ margin: 0, fontSize: 24, fontWeight: 700, letterSpacing: "-0.02em", color: "#f0f0f0" }}>Jun 20 → Sep 18</h1>
            <div style={{ fontSize: 12, color: "#555", textAlign: "right" }}>
              <div>RRG / NRG</div>
              <div>Late Sept → Peak Season</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 0 }}>
            {PHASES.map((p) => (
              <div key={p.id} onClick={() => setSelectedWeek(p.weeks[0])}
                style={{ flex: 1, padding: "10px 10px 12px", cursor: "pointer",
                  borderBottom: phase.id === p.id ? `3px solid ${p.color}` : "3px solid transparent",
                  opacity: phase.id === p.id ? 1 : 0.4, transition: "all 0.2s" }}>
                <div style={{ fontSize: 9, letterSpacing: "0.12em", textTransform: "uppercase", color: phase.id === p.id ? p.color : "#555", marginBottom: 3 }}>
                  Wk {p.weeks[0]}–{p.weeks[p.weeks.length - 1]}
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#ddd" }}>{p.name}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "20px" }}>
        <button onClick={() => setShowWarmups(!showWarmups)}
          style={{
            display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%",
            background: "#141414", border: "1px solid #232323", borderRadius: 8,
            padding: "12px 16px", marginBottom: showWarmups ? 0 : 20, cursor: "pointer", color: "#aaa",
          }}>
          <span style={{ fontSize: 13, fontWeight: 600 }}>🔥 Warm-Up Routines (Indoor &amp; Outdoor)</span>
          <span style={{ fontSize: 10, transform: showWarmups ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
        </button>

        {showWarmups && (
          <div style={{ marginBottom: 20, display: "flex", flexDirection: "column", gap: 12 }}>
            {WARMUPS.map((wu) => (
              <div key={wu.name} style={{ background: "#121212", border: `1px solid ${wu.color}33`, borderLeft: `3px solid ${wu.color}`, borderRadius: 8, padding: "14px 16px" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: wu.color, marginBottom: 10, textTransform: "uppercase", letterSpacing: "0.06em" }}>
                  {wu.name}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {wu.steps.map((step, si) => (
                    <div key={si}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#bbb", marginBottom: 4 }}>{step.title}</div>
                      <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
                        {step.items.map((it, ii) => (
                          <li key={ii} style={{ fontSize: 11.5, color: "#777", lineHeight: 1.7, display: "flex", gap: 8 }}>
                            <span style={{ color: wu.color + "80", flexShrink: 0 }}>—</span>{it}
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{ background: "#141414", border: `1px solid ${phase.color}28`, borderLeft: `3px solid ${phase.color}`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: phase.color, marginBottom: 5 }}>
            {phase.name} · {phase.tagline}
          </div>
          <p style={{ margin: 0, fontSize: 13, color: "#888", lineHeight: 1.6 }}>{week.goal}</p>
        </div>

        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
          {Array.from({ length: 13 }, (_, i) => i + 1).map((w) => {
            const wp = phaseForWeek(w);
            const ws = PROGRAM[w]?.sessions || [];
            const wc = ws.filter((_, i) => completedSessions[`${w}-${i}`]).length;
            const isDone = wc === ws.length && ws.length > 0;
            const isSelected = selectedWeek === w;
            return (
              <button key={w} onClick={() => setSelectedWeek(w)} title={`Week ${w}: ${WEEK_DATES[w]}`}
                style={{ width: 40, height: 40, borderRadius: 7,
                  border: isSelected ? `2px solid ${wp.color}` : "2px solid #222",
                  background: isDone ? wp.color + "28" : isSelected ? "#1c1c1c" : "#111",
                  color: isSelected ? "#f0f0f0" : "#666", fontSize: 12, fontWeight: isSelected ? 700 : 400,
                  cursor: "pointer", position: "relative", transition: "all 0.15s", flexShrink: 0 }}>
                {w}
                {isDone && <span style={{ position: "absolute", top: 1, right: 3, fontSize: 7, color: wp.color }}>✓</span>}
              </button>
            );
          })}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 3 }}>
              Week {selectedWeek} · {WEEK_DATES[selectedWeek]}
            </div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#f0f0f0" }}>{weekProgress}/{totalSessions} sessions</div>
          </div>
          <div style={{ width: 72, height: 3, background: "#1e1e1e", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(weekProgress / totalSessions) * 100}%`, background: phase.color, transition: "width 0.3s", borderRadius: 2 }} />
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
          {week.sessions.map((session, idx) => {
            const key = `${selectedWeek}-${idx}`;
            const done = !!completedSessions[key];
            const expanded = expandedSession === idx;
            const tagColor = SESSION_COLORS[session.type] || "#555";
            const isOptional = session.type === "Optional" || session.optional;
            const chosenOpt = selectedOption[key];
            const chosenDetails = session.options
              ? (session.options.find((o) => o.name === chosenOpt) || session.options[0])
              : null;
            const log = hangLog[key] || {};

            return (
              <div key={idx} style={{
                background: done ? "#131313" : "#151515",
                border: `1px solid ${done ? phase.color + "44" : "#1e1e1e"}`,
                borderRadius: 9, overflow: "hidden", opacity: isOptional ? 0.8 : 1, transition: "border-color 0.2s",
              }}>
                <div style={{ display: "flex", alignItems: "center", padding: "13px 16px", cursor: "pointer", gap: 12 }} onClick={() => toggleExpand(idx)}>
                  <button onClick={(e) => { e.stopPropagation(); toggleSession(selectedWeek, idx); }}
                    style={{ width: 28, height: 28, borderRadius: "50%",
                      border: `2px solid ${done ? phase.color : "#2a2a2a"}`,
                      background: done ? phase.color : "transparent",
                      color: done ? "#000" : "transparent", fontSize: 12, cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", flexShrink: 0 }}>✓</button>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: done ? "#555" : "#ddd" }}>{session.day}</span>
                      <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, background: tagColor + "20", color: tagColor, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                        {session.label}
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: "#444" }}>{session.duration}{chosenOpt ? ` · ${chosenOpt}` : ""}</div>
                  </div>
                  <div style={{ color: "#333", fontSize: 10, transform: expanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</div>
                </div>

                {expanded && (
                  <div style={{ borderTop: "1px solid #1a1a1a", padding: "12px 16px" }}>
                    {/* Multiple-option sessions: show selector chips */}
                    {session.options && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                          Choose a variant
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                          {session.options.map((opt) => (
                            <button key={opt.name} onClick={() => pickOption(idx, opt.name)}
                              style={{
                                fontSize: 11, padding: "5px 10px", borderRadius: 6,
                                border: `1px solid ${chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#2a2a2a"}`,
                                background: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor + "22" : "transparent",
                                color: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#777",
                                cursor: "pointer",
                              }}>
                              {opt.name}
                            </button>
                          ))}
                        </div>
                        <ul style={{ margin: "0 0 12px 0", padding: 0, listStyle: "none" }}>
                          {chosenDetails.details.map((d, di) => (
                            <li key={di} style={{ fontSize: 12, color: "#777", lineHeight: 1.75, display: "flex", gap: 10 }}>
                              <span style={{ color: tagColor + "70", flexShrink: 0 }}>—</span>{d}
                            </li>
                          ))}
                        </ul>
                      </>
                    )}

                    {/* Static detail sessions */}
                    {session.details && (
                      <ul style={{ margin: session.options ? "0 0 12px 0" : 0, padding: 0, listStyle: "none" }}>
                        {session.details.map((d, di) => (
                          <li key={di} style={{ fontSize: 12, color: done ? "#3a3a3a" : "#777", lineHeight: 1.75, display: "flex", gap: 10, textDecoration: done ? "line-through" : "none" }}>
                            <span style={{ color: phase.color + "70", flexShrink: 0 }}>—</span>{d}
                          </li>
                        ))}
                      </ul>
                    )}

                    {session.followUp && (
                      <div style={{ fontSize: 11, color: "#555", fontStyle: "italic", marginTop: 4, marginBottom: session.isHangboard ? 12 : 0 }}>
                        Then: {session.followUp}
                      </div>
                    )}

                    {/* Accessory picker for hangboard sessions */}
                    {session.isHangboard && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", margin: "12px 0 8px" }}>
                          Accessory block options
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                          {ACCESSORY_OPTIONS.map((acc) => (
                            <details key={acc.name} style={{ background: "#101010", border: "1px solid #1e1e1e", borderRadius: 6, padding: "8px 12px" }}>
                              <summary style={{ fontSize: 12, fontWeight: 600, color: "#999", cursor: "pointer" }}>{acc.name}</summary>
                              <ul style={{ margin: "8px 0 0 0", padding: 0, listStyle: "none" }}>
                                {acc.details.map((d, di) => (
                                  <li key={di} style={{ fontSize: 11.5, color: "#666", lineHeight: 1.7, display: "flex", gap: 8 }}>
                                    <span style={{ color: "#3a3a3a", flexShrink: 0 }}>—</span>{d}
                                  </li>
                                ))}
                              </ul>
                            </details>
                          ))}
                        </div>

                        {/* Progress log */}
                        <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 12 }}>
                          <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                            Log this session
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Edge (mm)</label>
                              <input type="text" value={log.edge || ""} onChange={(e) => updateLog(idx, "edge", e.target.value)}
                                placeholder="20"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Added/Removed Wt (lb)</label>
                              <input type="text" value={log.weight || ""} onChange={(e) => updateLog(idx, "weight", e.target.value)}
                                placeholder="+10 or -5"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>RPE (1–10)</label>
                              <input type="text" value={log.rpe || ""} onChange={(e) => updateLog(idx, "rpe", e.target.value)}
                                placeholder="8"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                          </div>
                          <textarea value={log.note || ""} onChange={(e) => updateLog(idx, "note", e.target.value)}
                            placeholder="Notes (grip felt, accessory work done, etc.)"
                            style={{ width: "100%", minHeight: 50, background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                        </div>
                      </>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Hangboard progress history */}
        {hangboardHistory.length > 0 && (
          <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 10 }}>
              Hangboard Progress Log
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {hangboardHistory.map((h, i) => (
                <div key={i} style={{ display: "flex", gap: 10, fontSize: 11.5, color: "#777", borderBottom: i < hangboardHistory.length - 1 ? "1px solid #1a1a1a" : "none", paddingBottom: 6 }}>
                  <span style={{ color: "#2e6da4", fontWeight: 600, minWidth: 50 }}>Wk {h.week}</span>
                  <span style={{ minWidth: 70, color: "#555" }}>{h.day}</span>
                  <span style={{ flex: 1, color: "#888" }}>{h.option}</span>
                  <span style={{ color: "#666" }}>{h.edge ? `${h.edge}mm` : ""}</span>
                  <span style={{ color: "#666" }}>{h.weight || ""}</span>
                  <span style={{ color: "#666" }}>{h.rpe ? `RPE ${h.rpe}` : ""}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "13px 16px", marginBottom: 28 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 7 }}>Coach Note</div>
          <p style={{ margin: 0, fontSize: 12, color: "#5a5a5a", lineHeight: 1.75, fontStyle: "italic" }}>{week.notes}</p>
        </div>

        <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 22 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 14 }}>Full Timeline</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {PHASES.map((p) => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 3, height: 36, background: p.color, borderRadius: 2, flexShrink: 0, opacity: phase.id === p.id ? 1 : 0.3 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: phase.id === p.id ? "#ddd" : "#444" }}>{p.name}</span>
                    <span style={{ fontSize: 10, color: "#3a3a3a" }}>
                      {WEEK_DATES[p.weeks[0]].split("–")[0].trim()} – {WEEK_DATES[p.weeks[p.weeks.length-1]].split("–")[1]?.trim() || ""}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: phase.id === p.id ? p.color : "#333" }}>{p.tagline}</div>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 4 }}>
              <div style={{ width: 3, height: 36, background: "#e8b84b", borderRadius: 2, flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between" }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#888" }}>Performance Season</span>
                  <span style={{ fontSize: 10, color: "#3a3a3a" }}>Late Sept →</span>
                </div>
                <div style={{ fontSize: 11, color: "#e8b84b80" }}>RRG · NRG · Send season</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<ClimbingProgram />);
</script>
</body>
</html>
