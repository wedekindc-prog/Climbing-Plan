  #loading {

    color: #888; font-family: -apple-system, sans-serif; font-size: 14px; flex-direction: column; gap: 12px;
  }
  #error-banner {
    display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    background: #3a1414; color: #ffb4b4; font-family: -apple-system, monospace;
    font-size: 12px; padding: 16px; white-space: pre-wrap; max-height: 80vh; overflow: auto;
    border-bottom: 2px solid #b54545;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #2a2a2a; border-top-color: #4a9d6f;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div id="error-banner"></div>
<div id="loading"><div class="spinner"></div><div>Loading climbing plan…</div></div>
<div id="root"></div>

<script>
window.addEventListener('error', function(e) {
  var b = document.getElementById('error-banner');
  b.style.display = 'block';
  b.textContent = 'Error loading app:\n' + (e.message || e.error || 'Unknown error') +
    (e.filename ? ('\n\nFile: ' + e.filename + ':' + e.lineno) : '');
});

(function() {
  try {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">' +
      '<rect width="512" height="512" rx="96" fill="#0d0d0d"/>' +
      '<rect x="0" y="0" width="512" height="512" rx="96" fill="none" stroke="#2e6da4" stroke-width="6"/>' +
      '<path d="M120 380 L210 220 L260 300 L320 180 L400 380 Z" fill="none" stroke="#b5451b" stroke-width="22" stroke-linejoin="round" stroke-linecap="round"/>' +
      '<circle cx="320" cy="150" r="28" fill="#4a9d6f"/>' +
      '</svg>';
    var svgUrl = "data:image/svg+xml;base64," + btoa(svg);
    document.getElementById('apple-icon').setAttribute('href', svgUrl);

    var manifest = {
      name: "Climb Training Plan",
      short_name: "Climb Plan",
      start_url: ".",
      display: "standalone",
      background_color: "#0d0d0d",
      theme_color: "#0d0d0d",
      icons: [{ src: svgUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
    };
    var manifestBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
    document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));
  } catch (e) {
    console.error('icon/manifest setup failed', e);
  }
})();
</script>

        '\nBabel loaded: ' + (typeof Babel !== 'undefined');

});
</script>

// Persisted via localStorage so progress survives closing the app
function useStoredState(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : initial;
    } catch (e) {
      return initial;
    }
  });
  const setAndStore = (updater) => {
    setState((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { window.localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };
  return [state, setAndStore];
}

                    {session.options && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                          Choose a variant
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                          {session.options.map((opt) => (
                            <button key={opt.name} onClick={() => pickOption(idx, opt.name)}
                              style={{
                                fontSize: 11, padding: "5px 10px", borderRadius: 6,
                                border: `1px solid ${chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#2a2a2a"}`,
                                background: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor + "22" : "transparent",
                                color: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#777",
                                cursor: "pointer",
                              }}>
                              {opt.name}
                            </button>
                          ))}
                        </div>
                        <ul style={{ margin: "0 0 12px 0", padding: 0, listStyle: "none" }}>
                          {chosenDetails.details.map((d, di) => (
                            <li key={di} style={{ fontSize: 12, color: "#777", lineHeight: 1.75, display: "flex", gap: 10 }}>
                              <span style={{ color: tagColor + "70", flexShrink: 0 }}>—</span>{d}
                            </li>
                          ))}
                        </ul>
                      </>
                    )}

                    {/* Static detail sessions */}
                    {session.details && (
                      <ul style={{ margin: session.options ? "0 0 12px 0" : 0, padding: 0, listStyle: "none" }}>
                        {session.details.map((d, di) => (
                          <li key={di} style={{ fontSize: 12, color: done ? "#3a3a3a" : "#777", lineHeight: 1.75, display: "flex", gap: 10, textDecoration: done ? "line-through" : "none" }}>
                            <span style={{ color: phase.color + "70", flexShrink: 0 }}>—</span>{d}
                          </li>
                        ))}
                      </ul>
                    )}

                    {session.followUp && (
                      <div style={{ fontSize: 11, color: "#555", fontStyle: "italic", marginTop: 4, marginBottom: session.isHangboard ? 12 : 0 }}>
                        Then: {session.followUp}
                      </div>
                    )}

                    {/* Accessory picker for hangboard sessions */}
                    {session.isHangboard && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", margin: "12px 0 8px" }}>
                          Accessory block options
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                          {ACCESSORY_OPTIONS.map((acc) => (
                            <details key={acc.name} style={{ background: "#101010", border: "1px solid #1e1e1e", borderRadius: 6, padding: "8px 12px" }}>
                              <summary style={{ fontSize: 12, fontWeight: 600, color: "#999", cursor: "pointer" }}>{acc.name}</summary>
                              <ul style={{ margin: "8px 0 0 0", padding: 0, listStyle: "none" }}>
                                {acc.details.map((d, di) => (
                                  <li key={di} style={{ fontSize: 11.5, color: "#666", lineHeight: 1.7, display: "flex", gap: 8 }}>
                                    <span style={{ color: "#3a3a3a", flexShrink: 0 }}>—</span>{d}
                                  </li>
                                ))}
                              </ul>
                            </details>
                          ))}
                        </div>

                        {/* Progress log */}
                        <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 12 }}>
                          <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                            Log this session
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Edge (mm)</label>
                              <input type="text" value={log.edge || ""} onChange={(e) => updateLog(idx, "edge", e.target.value)}
                                placeholder="20"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Added/Removed Wt (lb)</label>
                              <input type="text" value={log.weight || ""} onChange={(e) => updateLog(idx, "weight", e.target.value)}
                                placeholder="+10 or -5"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>RPE (1–10)</label>
                              <input type="text" value={log.rpe || ""} onChange={(e) => updateLog(idx, "rpe", e.target.value)}
                                placeholder="8"
                                style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                          </div>
                          <textarea value={log.note || ""} onChange={(e) => updateLog(idx, "note", e.target.value)}
                            placeholder="Notes (grip felt, accessory work done, etc.)"
                            style={{ width: "100%", minHeight: 50, background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                        </div>
                      </>
                    )}
                    {/* Outdoor day crag/route logging */}
                    {session.isOutdoorDay && (
                      <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 12, marginTop: session.details ? 0 : 4 }}>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                          Log this outdoor day
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 4 }}>
                          <div>
                            <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Crag(s)</label>
                            <input type="text" value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).crag || ""}
                              onChange={(e) => updateOutdoorLog(idx, "crag", e.target.value)}
                              placeholder="e.g. Red River Gorge — Roadside, Muir Valley"
                              style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                          </div>
                          <div>
                            <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Routes / Problems</label>
                            <textarea value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).routes || ""}
                              onChange={(e) => updateOutdoorLog(idx, "routes", e.target.value)}
                              placeholder="e.g. Roadside Attraction 12a - sent; Table of Colors 12b - worked, 1 hang at crux"
                              style={{ width: "100%", minHeight: 60, background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                          </div>
                          <div>
                            <label style={{ fontSize: 10, color: "#555", display: "block", marginBottom: 4 }}>Conditions</label>
                            <input type="text" value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).conditions || ""}
                              onChange={(e) => updateOutdoorLog(idx, "conditions", e.target.value)}
                              placeholder="e.g. 58°F, dry, light breeze — great friction"
                              style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                          </div>
                        </div>
                      </div>
                    )}

                    {/* General notes field on every session */}
                    <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 12, marginTop: 12 }}>
                      <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#444", marginBottom: 8 }}>
                        Session notes
                      </div>
                      <textarea value={sessionNotes[`${selectedWeek}-${idx}`] || ""}
                        onChange={(e) => updateSessionNote(idx, e.target.value)}
                        placeholder="How did it feel? Anything to remember for next time?"
                        style={{ width: "100%", minHeight: 50, background: "#0a0a0a", border: "1px solid #2a2a2a", borderRadius: 5, color: "#ddd", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Hangboard progress history */}
        {hangboardHistory.length > 0 && (
          <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 10 }}>
              Hangboard Progress Log
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {hangboardHistory.map((h, i) => (
                <div key={i} style={{ display: "flex", gap: 10, fontSize: 11.5, color: "#777", borderBottom: i < hangboardHistory.length - 1 ? "1px solid #1a1a1a" : "none", paddingBottom: 6 }}>
                  <span style={{ color: "#2e6da4", fontWeight: 600, minWidth: 50 }}>Wk {h.week}</span>
                  <span style={{ minWidth: 70, color: "#555" }}>{h.day}</span>
                  <span style={{ flex: 1, color: "#888" }}>{h.option}</span>
                  <span style={{ color: "#666" }}>{h.edge ? `${h.edge}mm` : ""}</span>
                  <span style={{ color: "#666" }}>{h.weight || ""}</span>
                  <span style={{ color: "#666" }}>{h.rpe ? `RPE ${h.rpe}` : ""}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Outdoor day log history */}
        {outdoorHistory.length > 0 && (
          <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 10 }}>
              Outdoor Day Log
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {outdoorHistory.map((h, i) => (
                <div key={i} style={{ borderBottom: i < outdoorHistory.length - 1 ? "1px solid #1a1a1a" : "none", paddingBottom: 10 }}>
                  <div style={{ display: "flex", gap: 10, fontSize: 11.5, marginBottom: 4 }}>
                    <span style={{ color: "#e8b84b", fontWeight: 600, minWidth: 50 }}>Wk {h.week}</span>
                    <span style={{ color: "#999", flex: 1 }}>{h.crag || "—"}</span>
                    <span style={{ color: "#666" }}>{h.conditions || ""}</span>
                  </div>
                  {h.routes && (
                    <div style={{ fontSize: 11.5, color: "#777", lineHeight: 1.6, paddingLeft: 60, whiteSpace: "pre-wrap" }}>{h.routes}</div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ background: "#111", border: "1px solid #1e1e1e", borderRadius: 8, padding: "13px 16px", marginBottom: 28 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 7 }}>Coach Note</div>
          <p style={{ margin: 0, fontSize: 12, color: "#5a5a5a", lineHeight: 1.75, fontStyle: "italic" }}>{week.notes}</p>
        </div>

        <div style={{ borderTop: "1px solid #1a1a1a", paddingTop: 22 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#3a3a3a", marginBottom: 14 }}>Full Timeline</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {PHASES.map((p) => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 3, height: 36, background: p.color, borderRadius: 2, flexShrink: 0, opacity: phase.id === p.id ? 1 : 0.3 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: phase.id === p.id ? "#ddd" : "#444" }}>{p.name}</span>
                    <span style={{ fontSize: 10, color: "#3a3a3a" }}>
                      {WEEK_DATES[p.weeks[0]].split("–")[0].trim()} – {WEEK_DATES[p.weeks[p.weeks.length-1]].split("–")[1]?.trim() || ""}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: phase.id === p.id ? p.color : "#333" }}>{p.tagline}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


  ReactDOM.createRoot(document.getElementById('root')).render(<ClimbingProgram />);
  document.getElementById('loading').style.display = 'none';
} catch (err) {
  var b = document.getElementById('error-banner');
  b.style.display = 'block';
  b.textContent = 'App error: ' + err.message + '\n\n' + (err.stack || '');
  document.getElementById('loading').style.display = 'none';
  console.error(err);
}
</script>
</body>
</html>
