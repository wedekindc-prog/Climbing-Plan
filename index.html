// Program starts Saturday, June 20, 2026 — each "week" runs Sat through Fri to match
// the climbing schedule (weekend mileage/outdoor days, weekday training in between).
const PROGRAM_START = new Date(2026, 5, 20); // month is 0-indexed: 5 = June

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function weekStartDate(weekNum) {
  return addDays(PROGRAM_START, (weekNum - 1) * 7);
}

const MONTH_ABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtShort(d) {
  return `${MONTH_ABBR[d.getMonth()]} ${d.getDate()}`;
}

function weekDateRangeLabel(weekNum) {
  const start = weekStartDate(weekNum);
  const end = addDays(start, 6);
  if (start.getMonth() === end.getMonth()) {
    return `${MONTH_ABBR[start.getMonth()]} ${start.getDate()}–${end.getDate()}`;
  }
  return `${fmtShort(start)}–${fmtShort(end)}`;
}

// Maps a day label (e.g. "Tuesday", "Saturday–Sunday", "Tue / Wed", "Mon / Wed / Fri")
// to the actual date(s) within a given week. Week runs Sat(0)...Fri(6).
const DAY_OFFSET = { Sat:0, Sun:1, Mon:2, Tue:3, Wed:4, Thu:5, Fri:6 };
const DAY_FULL_TO_ABBR = {
  Saturday:"Sat", Sunday:"Sun", Monday:"Mon", Tuesday:"Tue",
  Wednesday:"Wed", Thursday:"Thu", Friday:"Fri",
};

function dayLabelToDates(weekNum, dayLabel) {
  const start = weekStartDate(weekNum);
  // Strip "(optional)" or similar parenthetical
  const cleanLabel = dayLabel.replace(/\s*\([^)]*\)/g, "").trim();
  // Split on "–" (range) or "/" (either-or) — handle both full and abbreviated day names
  let parts;
  let isRange = false;
  if (cleanLabel.includes("–")) {
    parts = cleanLabel.split("–").map(s => s.trim());
    isRange = true;
  } else if (cleanLabel.includes("/")) {
    parts = cleanLabel.split("/").map(s => s.trim());
  } else {
    parts = [cleanLabel];
  }

  const toAbbr = (name) => DAY_FULL_TO_ABBR[name] || name.slice(0,3);
  const dates = parts.map((p) => {
    const abbr = toAbbr(p);
    const offset = DAY_OFFSET[abbr];
    if (offset === undefined) return null;
    return addDays(start, offset);
  }).filter(Boolean);

  if (dates.length === 0) return "";
  if (isRange && dates.length === 2) {
    const [a, b] = dates;
    if (a.getMonth() === b.getMonth()) {
      return `${MONTH_ABBR[a.getMonth()]} ${a.getDate()}–${b.getDate()}`;
    }
    return `${fmtShort(a)}–${fmtShort(b)}`;
  }
  // "either/or" or single day: show each date separated by " / "
  return dates.map(fmtShort).join(" / ");
}

// Returns the earliest day-offset (0=Sat...6=Fri) for a day label, used to sort
// sessions into real calendar order within a week (e.g. Sat before Tue, etc.)
function sessionDayOrder(dayLabel) {
  const cleanLabel = dayLabel.replace(/\s*\([^)]*\)/g, "").trim();
  const parts = cleanLabel.split(/[–/]/).map(s => s.trim());
  const toAbbr = (name) => DAY_FULL_TO_ABBR[name] || name.slice(0,3);
  const offsets = parts.map((p) => DAY_OFFSET[toAbbr(p)]).filter(o => o !== undefined);
  return offsets.length ? Math.min(...offsets) : 99;
}

const phaseForWeek = (w) => PHASES.find((p) => p.weeks.includes(w));

// Persisted via localStorage so progress survives closing the app
function useStoredState(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      return raw ? JSON.parse(raw) : initial;
    } catch (e) {
      return initial;
    }
  });
  const setAndStore = (updater) => {
    setState((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      try { window.localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };
  return [state, setAndStore];
}

  const [expandedSession, setExpandedSession] = useState(null);
  const [selectedOption, setSelectedOption] = useStoredState("climb_selectedOption", {});
  const [hangLog, setHangLog] = useStoredState("climb_hangLog", {});
  const [sessionNotes, setSessionNotes] = useStoredState("climb_sessionNotes", {});
  const [outdoorLog, setOutdoorLog] = useStoredState("climb_outdoorLog", {});

    const key = `${weekNum}-${sessionIdx}`;
    setCompletedSessions((prev) => ({ ...prev, [key]: !prev[key] }));
  };

  const toggleExpand = (idx) => setExpandedSession(expandedSession === idx ? null : idx);

  const pickOption = (idx, optName) => {
    setSelectedOption((prev) => ({ ...prev, [`${selectedWeek}-${idx}`]: optName }));
  };

  const updateLog = (idx, field, value) => {
    const key = `${selectedWeek}-${idx}`;
    setHangLog((prev) => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
  };

  const updateSessionNote = (idx, value) => {
    const key = `${selectedWeek}-${idx}`;
    setSessionNotes((prev) => ({ ...prev, [key]: value }));
  };

  const updateOutdoorLog = (idx, field, value) => {
    const key = `${selectedWeek}-${idx}`;
    setOutdoorLog((prev) => ({ ...prev, [key]: { ...prev[key], [field]: value } }));

  const weekProgress = (week.sessions || []).filter((_, i) => completedSessions[`${selectedWeek}-${i}`]).length;

  // Build hangboard progress history across all weeks for display

        const log = hangLog[key];

        if (log && (log.edge || log.weight || log.rpe)) {
          hangboardHistory.push({ week: wk, day: s.day, option: opt || "—", ...log });
        }
      }
    });
  });

        const log = outdoorLog[key];
        if (log && (log.crag || log.routes || log.conditions)) {

                  {wu.steps.map((step, si) => (
                    <div key={si}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#b3aebd", marginBottom: 4 }}>{step.title}</div>
                      <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
                        {step.items.map((it, ii) => (
                          <li key={ii} style={{ fontSize: 11.5, color: "#736d80", lineHeight: 1.7, display: "flex", gap: 8 }}>
                            <span style={{ color: wu.color + "80", flexShrink: 0 }}>—</span>{it}
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{ background: "#1f1d22", border: `1px solid ${phase.color}28`, borderLeft: `3px solid ${phase.color}`, borderRadius: 8, padding: "14px 18px", marginBottom: 20 }}>
          <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: phase.color, marginBottom: 5 }}>
            {phase.name} · {phase.tagline}
          </div>
          <p style={{ margin: 0, fontSize: 13, color: "#827c8f", lineHeight: 1.6 }}>{week.goal}</p>
        </div>

        <div style={{ display: "flex", gap: 7, marginBottom: 22, flexWrap: "wrap" }}>
          {Array.from({ length: 19 }, (_, i) => i + 1).map((w) => {
            const wp = phaseForWeek(w);
            const ws = PROGRAM[w]?.sessions || [];
            const wc = ws.filter((_, i) => completedSessions[`${w}-${i}`]).length;
            const isDone = wc === ws.length && ws.length > 0;
            const isSelected = selectedWeek === w;
            return (
              <button key={w} onClick={() => setSelectedWeek(w)} title={`Week ${w}: ${WEEK_DATES[w]}`}
                style={{ width: 38, height: 44, borderRadius: "4px 4px 10px 10px",
                  border: isSelected ? `2px solid ${wp.color}` : `1px solid #3a3642`,
                  borderTop: isSelected ? `4px solid ${wp.color}` : `4px solid ${wp.color}55`,
                  background: isSelected ? wp.color + "30" : isDone ? wp.color + "22" : "#19171c",
                  boxShadow: isSelected ? `0 0 14px ${wp.color}55, inset 0 0 8px ${wp.color}22` : "none",
                  color: isSelected ? "#f5f3f8" : "#655f70",
                  fontSize: 13, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
                  cursor: "pointer", position: "relative", transition: "all 0.15s", flexShrink: 0,
                  display: "flex", alignItems: "center", justifyContent: "center" }}>
                {String(w).padStart(2, "0")}
                {isDone && <span style={{ position: "absolute", top: -2, right: -2, fontSize: 8, color: wp.color, background: "#151417", borderRadius: "50%", width: 12, height: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>✓</span>}
              </button>
            );
          })}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", marginBottom: 3 }}>
              Week {selectedWeek} · {WEEK_DATES[selectedWeek]}
            </div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#f5f3f8" }}>{weekProgress}/{totalSessions} sessions</div>
          </div>
          <div style={{ width: 72, height: 3, background: "#322e38", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(weekProgress / totalSessions) * 100}%`, background: phase.color, transition: "width 0.3s", borderRadius: 2 }} />
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 18 }}>
          {week.sessions
            .map((session, idx) => ({ session, idx }))
            .sort((a, b) => sessionDayOrder(a.session.day) - sessionDayOrder(b.session.day))
            .map(({ session, idx }) => {
            const key = `${selectedWeek}-${idx}`;
            const done = !!completedSessions[key];
            const expanded = expandedSession === idx;
            const tagColor = SESSION_COLORS[session.type] || "#565161";
            const isOptional = session.type === "Optional" || session.optional;
            const chosenOpt = selectedOption[key];
            const chosenDetails = session.options
              ? (session.options.find((o) => o.name === chosenOpt) || session.options[0])
              : null;
            const log = hangLog[key] || {};

            return (
              <div key={idx} style={{
                background: done ? "#1b1a1e" : "#1f1d22",
                border: `1px solid ${done ? phase.color + "44" : "#322e38"}`,
                borderRadius: 9, overflow: "hidden", opacity: isOptional ? 0.8 : 1, transition: "border-color 0.2s",
              }}>
                <div style={{ display: "flex", alignItems: "center", padding: "13px 16px", cursor: "pointer", gap: 12 }} onClick={() => toggleExpand(idx)}>
                  <button onClick={(e) => { e.stopPropagation(); toggleSession(selectedWeek, idx); }}
                    style={{ width: 28, height: 28, borderRadius: "50%",
                      border: `2px solid ${done ? phase.color : "#454050"}`,
                      background: done ? phase.color : "transparent",
                      color: done ? "#000" : "transparent", fontSize: 12, cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s", flexShrink: 0 }}>✓</button>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: done ? "#565161" : "#d8d5e0" }}>{session.day}</span>
                      <span style={{ fontSize: 11, fontWeight: 500, color: done ? "#4d4738" : phase.color, fontFamily: "'JetBrains Mono', monospace" }}>{dayLabelToDates(selectedWeek, session.day)}</span>
                      <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, background: tagColor + "20", color: tagColor, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                        {session.label}
                      </span>
                    </div>
                    <div style={{ fontSize: 11, color: "#4d4738" }}>{session.duration}{chosenOpt ? ` · ${chosenOpt}` : ""}</div>
                  </div>
                  <div style={{ color: "#333", fontSize: 10, transform: expanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</div>
                </div>

                {expanded && (
                  <div style={{ borderTop: "1px solid #2a2730", padding: "12px 16px" }}>
                    {/* Multiple-option sessions: show selector chips */}
                    {session.options && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", marginBottom: 8 }}>
                          Choose a variant
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                          {session.options.map((opt) => (
                            <button key={opt.name} onClick={() => pickOption(idx, opt.name)}
                              style={{
                                fontSize: 11, padding: "5px 10px", borderRadius: 6,
                                border: `1px solid ${chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#454050"}`,
                                background: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor + "22" : "transparent",
                                color: chosenOpt === opt.name || (!chosenOpt && opt === session.options[0]) ? tagColor : "#736d80",
                                cursor: "pointer",
                              }}>
                              {opt.name}
                            </button>
                          ))}
                        </div>
                        <ul style={{ margin: "0 0 12px 0", padding: 0, listStyle: "none" }}>
                          {chosenDetails.details.map((d, di) => (
                            <li key={di} style={{ fontSize: 12, color: "#736d80", lineHeight: 1.75, display: "flex", gap: 10 }}>
                              <span style={{ color: tagColor + "70", flexShrink: 0 }}>—</span>{d}
                            </li>
                          ))}
                        </ul>
                      </>
                    )}

                    {/* Static detail sessions — only when there's no variant picker, to avoid showing both */}
                    {session.details && !session.options && (
                      <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
                        {session.details.map((d, di) => (
                          <li key={di} style={{ fontSize: 12, color: done ? "#423d31" : "#736d80", lineHeight: 1.75, display: "flex", gap: 10, textDecoration: done ? "line-through" : "none" }}>
                            <span style={{ color: phase.color + "70", flexShrink: 0 }}>—</span>{d}
                          </li>
                        ))}
                      </ul>
                    )}

                    {session.followUp && (
                      <div style={{ fontSize: 11, color: "#565161", fontStyle: "italic", marginTop: 4, marginBottom: session.isHangboard ? 12 : 0 }}>
                        Then: {session.followUp}
                      </div>
                    )}

                    {/* Accessory picker for hangboard sessions */}
                    {session.isHangboard && (
                      <>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", margin: "12px 0 8px" }}>
                          Accessory block options
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                          {ACCESSORY_OPTIONS.map((acc) => (
                            <details key={acc.name} style={{ background: "#15131a", border: "1px solid #322e38", borderRadius: 6, padding: "8px 12px" }}>
                              <summary style={{ fontSize: 12, fontWeight: 600, color: "#928ca0", cursor: "pointer" }}>{acc.name}</summary>
                              <ul style={{ margin: "8px 0 0 0", padding: 0, listStyle: "none" }}>
                                {acc.details.map((d, di) => (
                                  <li key={di} style={{ fontSize: 11.5, color: "#655f70", lineHeight: 1.7, display: "flex", gap: 8 }}>
                                    <span style={{ color: "#423d31", flexShrink: 0 }}>—</span>{d}
                                  </li>
                                ))}
                              </ul>
                            </details>
                          ))}
                        </div>

                        {/* Progress log */}
                        <div style={{ borderTop: "1px solid #2a2730", paddingTop: 12 }}>
                          <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", marginBottom: 8 }}>
                            Log this session
                          </div>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
                            <div>
                              <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>Edge (mm)</label>
                              <input type="text" value={log.edge || ""} onChange={(e) => updateLog(idx, "edge", e.target.value)}
                                placeholder="20"
                                style={{ width: "100%", background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>Added/Removed Wt (lb)</label>
                              <input type="text" value={log.weight || ""} onChange={(e) => updateLog(idx, "weight", e.target.value)}
                                placeholder="+10 or -5"
                                style={{ width: "100%", background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                            <div>
                              <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>RPE (1–10)</label>
                              <input type="text" value={log.rpe || ""} onChange={(e) => updateLog(idx, "rpe", e.target.value)}
                                placeholder="8"
                                style={{ width: "100%", background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                            </div>
                          </div>
                          <textarea value={log.note || ""} onChange={(e) => updateLog(idx, "note", e.target.value)}
                            placeholder="Notes (grip felt, accessory work done, etc.)"
                            style={{ width: "100%", minHeight: 50, background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                        </div>
                      </>
                    )}
                    {/* Outdoor day crag/route logging */}
                    {session.isOutdoorDay && (
                      <div style={{ borderTop: "1px solid #2a2730", paddingTop: 12, marginTop: session.details ? 0 : 4 }}>
                        <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", marginBottom: 8 }}>
                          Log this outdoor day
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 4 }}>
                          <div>
                            <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>Crag(s)</label>
                            <input type="text" value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).crag || ""}
                              onChange={(e) => updateOutdoorLog(idx, "crag", e.target.value)}
                              placeholder="e.g. Red River Gorge — Roadside, Muir Valley"
                              style={{ width: "100%", background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                          </div>
                          <div>
                            <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>Routes / Problems</label>
                            <textarea value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).routes || ""}
                              onChange={(e) => updateOutdoorLog(idx, "routes", e.target.value)}
                              placeholder="e.g. Roadside Attraction 12a - sent; Table of Colors 12b - worked, 1 hang at crux"
                              style={{ width: "100%", minHeight: 60, background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                          </div>
                          <div>
                            <label style={{ fontSize: 10, color: "#565161", display: "block", marginBottom: 4 }}>Conditions</label>
                            <input type="text" value={(outdoorLog[`${selectedWeek}-${idx}`] || {}).conditions || ""}
                              onChange={(e) => updateOutdoorLog(idx, "conditions", e.target.value)}
                              placeholder="e.g. 58°F, dry, light breeze — great friction"
                              style={{ width: "100%", background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "6px 8px", boxSizing: "border-box" }} />
                          </div>
                        </div>
                      </div>
                    )}

                    {/* General notes field on every session */}
                    <div style={{ borderTop: "1px solid #2a2730", paddingTop: 12, marginTop: 12 }}>
                      <div style={{ fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase", color: "#4d4738", marginBottom: 8 }}>
                        Session notes
                      </div>
                      <textarea value={sessionNotes[`${selectedWeek}-${idx}`] || ""}
                        onChange={(e) => updateSessionNote(idx, e.target.value)}
                        placeholder="How did it feel? Anything to remember for next time?"
                        style={{ width: "100%", minHeight: 50, background: "#100f12", border: "1px solid #454050", borderRadius: 5, color: "#d8d5e0", fontSize: 12, padding: "8px", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Hangboard progress history */}
        {hangboardHistory.length > 0 && (
          <div style={{ background: "#19171c", border: "1px solid #322e38", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#423d31", marginBottom: 10 }}>
              Hangboard Progress Log
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {hangboardHistory.map((h, i) => (
                <div key={i} style={{ display: "flex", gap: 10, fontSize: 11.5, color: "#736d80", borderBottom: i < hangboardHistory.length - 1 ? "1px solid #2a2730" : "none", paddingBottom: 6 }}>
                  <span style={{ color: "#3da9ff", fontWeight: 700, minWidth: 50, fontFamily: "'JetBrains Mono', monospace" }}>WK {String(h.week).padStart(2,"0")}</span>
                  <span style={{ minWidth: 70, color: "#565161" }}>{h.day}</span>
                  <span style={{ flex: 1, color: "#827c8f" }}>{h.option}</span>
                  <span style={{ color: "#655f70" }}>{h.edge ? `${h.edge}mm` : ""}</span>
                  <span style={{ color: "#655f70" }}>{h.weight || ""}</span>
                  <span style={{ color: "#655f70" }}>{h.rpe ? `RPE ${h.rpe}` : ""}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Outdoor day log history */}
        {outdoorHistory.length > 0 && (
          <div style={{ background: "#19171c", border: "1px solid #322e38", borderRadius: 8, padding: "14px 16px", marginBottom: 20 }}>
            <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#423d31", marginBottom: 10 }}>
              Outdoor Day Log
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {outdoorHistory.map((h, i) => (
                <div key={i} style={{ borderBottom: i < outdoorHistory.length - 1 ? "1px solid #2a2730" : "none", paddingBottom: 10 }}>
                  <div style={{ display: "flex", gap: 10, fontSize: 11.5, marginBottom: 4 }}>
                    <span style={{ color: "#ffc233", fontWeight: 700, minWidth: 50, fontFamily: "'JetBrains Mono', monospace" }}>WK {String(h.week).padStart(2,"0")}</span>
                    <span style={{ color: "#928ca0", flex: 1 }}>{h.crag || "—"}</span>
                    <span style={{ color: "#655f70" }}>{h.conditions || ""}</span>
                  </div>
                  {h.routes && (
                    <div style={{ fontSize: 11.5, color: "#736d80", lineHeight: 1.6, paddingLeft: 60, whiteSpace: "pre-wrap" }}>{h.routes}</div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ background: "#19171c", border: "1px solid #322e38", borderRadius: 8, padding: "13px 16px", marginBottom: 28 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#423d31", marginBottom: 7 }}>Coach Note</div>
          <p style={{ margin: 0, fontSize: 12, color: "#565161", lineHeight: 1.75, fontStyle: "italic" }}>{week.notes}</p>
        </div>

        <div style={{ borderTop: "1px solid #2a2730", paddingTop: 22 }}>
          <div style={{ fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase", color: "#423d31", marginBottom: 14 }}>Full Timeline</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {PHASES.map((p) => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 3, height: 36, background: p.color, borderRadius: 2, flexShrink: 0, opacity: phase.id === p.id ? 1 : 0.3 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: phase.id === p.id ? "#d8d5e0" : "#4d4738" }}>{p.name}</span>
                    <span style={{ fontSize: 10, color: "#423d31" }}>
                      {WEEK_DATES[p.weeks[0]].split("–")[0].trim()} – {WEEK_DATES[p.weeks[p.weeks.length-1]].split("–")[1]?.trim() || ""}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: phase.id === p.id ? p.color : "#333" }}>{p.tagline}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}


  ReactDOM.createRoot(document.getElementById('root')).render(<ClimbingProgram />);
  document.getElementById('loading').style.display = 'none';
} catch (err) {
  var b = document.getElementById('error-banner');
  b.style.display = 'block';
  b.textContent = 'App error: ' + err.message + '\n\n' + (err.stack || '');
  document.getElementById('loading').style.display = 'none';
  console.error(err);
}
</script>
</body>
</html>
